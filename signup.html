<!-- REGISTRATION FORM -->
<section class="section" style="padding-top: 160px;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="card login-card p-5">
          <h2 class="mb-4">Create Your OMORI Account</h2>
          <p class="text-muted mb-4">Daftar untuk memulai, simpan pesanan, dan dapatkan akses penuh ke toko White Space.</p>

          <form id="signupForm" class="login-form">
            <div class="mb-3 text-start">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control minimalist-input" placeholder="Your full name" required>
            </div>
            <div class="mb-3 text-start">
              <label class="form-label">Email</label>
              <input type="email" class="form-control minimalist-input" placeholder="name@example.com" required>
            </div>
            <div class="mb-3 text-start">
              <label class="form-label">Password</label>
              <input type="password" class="form-control minimalist-input" placeholder="Create a password" required>
            </div>
            <div class="mb-3 text-start">
              <label class="form-label">Confirm Password</label>
              <input type="password" class="form-control minimalist-input" placeholder="Confirm password" required>
            </div>
            <button type="submit" class="minimal-btn w-100">Sign Up</button>
          </form>

          <p class="mt-4 small text-muted">Sudah punya akun? <a href="signin.html" class="link-secondary">Masuk di sini</a></p>
        </div>
      </div>
    </div>
  </div>
</section>
